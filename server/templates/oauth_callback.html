<!DOCTYPE html>
<html>

<head>
    <title>LinkedIn Authentication</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .success {
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0077B5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        {% if error %}
        <h2 class="error">❌ Authentication Failed</h2>
        <p>{{ error }}</p>
        <p>You can close this window and try again.</p>
        {% elif success %}
        <h2 class="success">✅ Authentication Successful</h2>
        <div class="spinner"></div>
        <p>Sending account information...</p>
        {% else %}
        <div class="spinner"></div>
        <p>Processing authentication...</p>
        {% endif %}
    </div>

    {% if success %}
    <script>
        console.log('OAuth Callback Script Started');
        // Send message to parent window with profile and organizations
        if (window.opener) {
            console.log('Opener found, sending message...');
            const messageData = {
                type: 'LINKEDIN_UNIFIED_SUCCESS',
                profile: {{ profile | tojson
        }},
        organizations: { { organizations | tojson } },
        tokenSessionId: '{{ token_session_id }}'
            };
        console.log('Message Data:', messageData);

        // Use '*' as target origin to ensure message reaches the opener regardless of port
        window.opener.postMessage(messageData, '*');

        // Close popup after a short delay
        setTimeout(() => {
            window.close();
        }, 1500);
        } else {
            document.querySelector('.container').innerHTML =
                '<h2 class="error">Error</h2><p>Unable to communicate with parent window. Please close this window and try again.</p>';
        }
    </script>
    {% elif error %}
    <script>
        // Send error message to parent window
        if (window.opener) {
            window.opener.postMessage({
                type: 'LINKEDIN_OAUTH_ERROR',
                error: '{{ error }}'
            }, '*');
        }
    </script>
    {% endif %}
</body>

</html>
